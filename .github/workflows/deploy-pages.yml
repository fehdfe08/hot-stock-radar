name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: "37 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build latest data
        run: npm run build:data

      - name: Show generated data timestamp
        run: |
          node <<'NODE'
          const fs = require('fs');
          const j = JSON.parse(fs.readFileSync('site/data/latest.json', 'utf8'));
          console.log({
            generatedAt: j.generatedAt,
            sourceTime: j.sourceTime,
            top: j.stocks?.slice(0, 3).map((s) => `${s.name}(${s.code})`)
          });
          NODE

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
